<!DOCTYPE html>
<html>
<head>
    <title>The Royal Lineage - RWA Mint</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
    <style>
        body { background: #0a0a0a; color: #d4af37; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        .vault-box { border: 2px solid #d4af37; padding: 30px; display: inline-block; border-radius: 10px; }
        button { background: #d4af37; color: black; border: none; padding: 15px 30px; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        #price { font-size: 2.5rem; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="vault-box">
        <h1>THE ROYAL LINEAGE</h1>
        <p>RWA Singleton Vault</p>
        <hr color="#d4af37">
        <p>CURRENT INSTITUTIONAL VALUATION:</p>
        <div id="price">LOADING...</div>
        <button onclick="purchaseRWA()">ACQUIRE ASSET</button>
        <p style="font-size: 0.8rem; margin-top: 20px;">Governor: 0xE307...6A7D</p>
    </div>

    <script>
        const vaultAddress = "0xE307450762415e991B45FA4952c4cD6E13f56A7D";
        const abi = [{"inputs":[],"name":"currentValue","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}];

        async function loadPrice() {
            try {
                const provider = new ethers.providers.JsonRpcProvider("https://base-mainnet.g.alchemy.com/v2/6kF0ihyoTX5OEQ447YRRc");
                const contract = new ethers.Contract(vaultAddress, abi, provider);
                const rawVal = await contract.currentValue();
                const price = parseFloat(rawVal) / 1000000; 
                
                document.getElementById('price').innerText = "$" + price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            } catch (err) {
                console.error("Error fetching price updates:", err);
                document.getElementById('price').innerText = "ERROR SYNCING";
            }
        }

        async function purchaseRWA() {
            if (typeof window.ethereum !== 'undefined') {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const tx = await signer.sendTransaction({
                    to: vaultAddress,
                    value: ethers.utils.parseEther("0.1")
                });
                alert("Purchase Initialized: " + tx.hash);
            } else {
                alert("Please install Rabby or MetaMask");
            }
        }
        
        loadPrice();
        setInterval(loadPrice, 30000);
    </script>
</body>
</html>
